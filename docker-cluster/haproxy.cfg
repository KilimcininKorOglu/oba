# HAProxy configuration for Oba LDAP cluster

global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    retries 3

# Stats page
frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# LDAP frontend - route all LDAP traffic to leader for write safety
frontend ldap_frontend
    bind *:389
    default_backend ldap_backend

backend ldap_backend
    balance first
    option tcp-check
    # Check leader state via REST health endpoint on port 8080.
    # /api/v1/cluster/health returns 200 for leader, 503 for followers.
    tcp-check connect port 8080
    tcp-check send-binary 474554202f6170692f76312f636c75737465722f6865616c746820485454502f312e310d0a486f73743a206c6f63616c686f73740d0a436f6e6e656374696f6e3a20636c6f73650d0a0d0a
    tcp-check expect rstring "^HTTP/1\\.[01] 200"
    server node1 oba-node1:1389 check inter 2s fall 2 rise 1
    server node2 oba-node2:1389 check inter 2s fall 2 rise 1
    server node3 oba-node3:1389 check inter 2s fall 2 rise 1

# REST API frontend - route writes to leader
frontend rest_frontend
    mode http
    bind *:8080
    default_backend rest_backend

backend rest_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/cluster/health
    http-check expect status 200
    # Only route to leader (returns 200), followers return 503
    server node1 oba-node1:8080 check inter 2s fall 2 rise 1
    server node2 oba-node2:8080 check inter 2s fall 2 rise 1
    server node3 oba-node3:8080 check inter 2s fall 2 rise 1

# REST API read-only backend - for read operations
frontend rest_read_frontend
    mode http
    bind *:8081
    default_backend rest_read_backend

backend rest_read_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health
    http-check expect status 200
    server node1 oba-node1:8080 check inter 5s fall 3 rise 2
    server node2 oba-node2:8080 check inter 5s fall 3 rise 2
    server node3 oba-node3:8080 check inter 5s fall 3 rise 2
